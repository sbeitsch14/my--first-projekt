<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Project</title>
    <style>
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #ccc;
            margin: 20px auto;
        }
        .button {
            padding: 10px 20px;
            margin: 20px;
            color: white;
            background-color: blue;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="avatar"></div>
    <h1>Welcome to My First Project</h1>
    <button class="button" id="clickButton">Click Me</button>
    <p id="counterText">Click count: 0</p>
    <script>
        let count = 0;
        const button = document.getElementById('clickButton');
        const counterText = document.getElementById('counterText');

        button.addEventListener('click', function() {
            count++;
            counterText.innerText = `Click count: ${count}`;
            button.style.backgroundColor = `#${Math.floor(Math.random()*16777215).toString(16)}`;
        });
    </script>
</body>
</html>
