<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лаборатория sbeitsch14</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1087/1087815.png" type="image/png">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --container-bg: #f0f0f0;
        }
        body.dark-mode {
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
            --container-bg: #333333;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            transition: 0.3s;
        }
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 20px;
        }
        .main-btn {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            margin: 10px;
        }
        .links-panel {
            margin-top: 30px;
            padding: 20px;
            background: var(--container-bg);
            border-radius: 12px;
            display: flex;
            gap: 10px;
        }
        .links-panel a {
            background: white;
            padding: 10px 15px;
            border-radius: 5px;
            color: #333;
            text-decoration: none;
            font-weight: bold;
        }
        /* Стили для цитаты - теперь всё закрыто правильно */
        .quote-box {
            margin-top: 20px;
            padding: 15px;
            border-left: 5px solid #007bff;
            background: rgba(0,123,255,0.1);
            font-style: italic;
            max-width: 80%;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="theme-toggle" onclick="toggleTheme()">🌙 Тема</div>

    <h1 id="greeting">Привет!</h1>
    <h2>Welcome to My First Project</h2>
    
    <button class="main-btn" onclick="changeColor()">Магия цвета</button>
    <button onclick="resetAll()">Сброс</button>
    
    <p>Click count: <span id="count">0</span></p>

    <div class="links-panel">
        <a href="https://google.com" target="_blank">Google</a>
        <a href="https://youtube.com" target="_blank">YouTube</a>
        <a href="https://github.com" target="_blank">GitHub</a>
    </div>

    <script>
        let count = 0;

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.querySelector('.theme-toggle').innerText = isDark ? "☀️ Свет" : "🌙 Тема";
        }

        function changeColor() {
            count++;
            document.getElementById('count').innerText = count;
            const randomColor = Math.floor(Math.random()*16777215).toString(16);
            document.body.style.backgroundColor = "#" + randomColor;
        }

        function resetAll() {
            count = 0;
            document.getElementById('count').innerText = count;
            document.body.style.backgroundColor = "";
            document.body.classList.remove('dark-mode');
            document.querySelector('.theme-toggle').innerText = "🌙 Тема";
        }

        // Приветствие по времени
        const hour = new Date().getHours();
        const greeting = document.getElementById('greeting');
        if (hour < 12) greeting.innerText = "Доброе утро!";
        else if (hour < 18) greeting.innerText = "Добрый день!";
        else greeting.innerText = "Добрый вечер!";

        // Логика цитат
        const quotes = [
            "Программирование — это не то, что вы знаете, а то, что вы можете выяснить.",
            "Лучший способ предсказать будущее — создать его.",
            "Ошибки — это знаки препинания в жизни, без которых, как и в тексте, не будет смысла."
        ];
        const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
        document.body.insertAdjacentHTML('beforeend', `<div class="quote-box">${randomQuote}</div>`);
    </script>
</body>
</html>
