<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark and Light Mode</title>
    <style>
        body {
            transition: background-color 0.5s, color 0.5s;
        }
        body.light-mode {
            background-color: #ffffff;
            color: #000000;
        }
        body.dark-mode {
            background-color: #000000;
            color: #ffffff;
        }
        .theme-button {
            width: 60px;
            height: 60px;
            border: none;
            cursor: pointer;
            font-size: 1.2em;
            transition: transform 0.3s;
        }
        .theme-label {
            font-size: 1.5em;
            display: block;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body class="light-mode">
    <button class="theme-button" id="theme-toggle">🌙</button>
    <span class="theme-label" id="theme-label">Switch to Dark Mode</span>
    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const themeLabel = document.getElementById('theme-label');
        themeToggle.onclick = function() {
            const body = document.body;
            body.classList.toggle('dark-mode');
            body.classList.toggle('light-mode');
            if (body.classList.contains('dark-mode')) {
                themeLabel.innerText = 'Switch to Light Mode';
            } else {
                themeLabel.innerText = 'Switch to Dark Mode';
            }
        };
    </script>
</body>
</html>
